# Pre-commit hooks: Python 用 ruff，前端用本地 eslint + tsc。
# 首次安装：pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict

  # v0.7.5: ruff-format 移到 CI（lint job 跑 `ruff format --check`），
  # 本地仅保留 ruff lint --fix，commit 速度更快、与编辑器 format on save 不冲突。
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: ^apps/api/
        args: ["--fix"]

  - repo: local
    hooks:
      - id: eslint
        name: eslint (apps/web)
        entry: pnpm --filter @anno/web lint
        language: system
        files: ^apps/web/.+\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: tsc-web
        name: tsc --noEmit (apps/web)
        entry: pnpm --filter @anno/web exec tsc -b --noEmit
        language: system
        files: ^apps/web/.+\.(ts|tsx)$
        pass_filenames: false

      # v0.8.8 · 修改 schema/路由/auth 时自动重新生成 OpenAPI snapshot 并 git add，
      # 避免 CI test_openapi_contract.py 红灯 + 让 PR 作者忘记 export 的事变成
      # 提交即修复。脚本会同步更新 docs-site/api/openapi.json 供 docs-site build。
      - id: regen-openapi-snapshot
        name: Regenerate OpenAPI snapshot (apps/api)
        entry: bash -c 'cd apps/api && uv run python ../../scripts/export_openapi.py && cd ../.. && git add apps/api/openapi.snapshot.json docs-site/api/openapi.json 2>/dev/null || true'
        language: system
        files: ^apps/api/app/(api|schemas)/.*\.py$
        pass_filenames: false
