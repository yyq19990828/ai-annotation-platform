  #   command: >
  #     sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # web:
  #   build:
  #     context: .
  #     dockerfile: infra/docker/Dockerfile.web
  #   ports:
  #     - "3001:80"
  #   depends_on:
  #     api:
  #       condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: celery -A app.workers.celery_app worker -l info -Q default,ml,media --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/annotation
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # v0.9.11 · Celery beat 独立 service. worker 与 beat 解耦 (worker 可 scale 多副本,
  # beat 必须单实例避免 schedule 重复触发). 复用同一 image (Dockerfile.api).
  # PerfHud 1s 推送 + audit partition 月度任务 + ml health 60s 等都依赖此进程.
  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: celery -A app.workers.celery_app beat -l info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/annotation
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # v0.9.0+ Grounded-SAM-2 ML Backend (GroundingDINO + SAM 2.1).
  # 默认 GPU profile, dev 无 GPU 笔记本不会被拉起; 启用方式:
  #   docker compose --profile gpu up grounded-sam2-backend
  # 首次启动会自动下载 checkpoints (~900MB), start_period 留足 120s.
  grounded-sam2-backend:
    build:
      # v0.9.4 phase 3: build context 升级到 apps/ 以便 COPY 兄弟目录 _shared/mask_utils
      # (与 v0.10.x sam3-backend 共用 mask→polygon 简化逻辑). Dockerfile 内所有 COPY 路径
      # 已加 grounded-sam2-backend/ 前缀; 历史 `docker build apps/grounded-sam2-backend/` 失效.
      context: ./apps
      dockerfile: grounded-sam2-backend/Dockerfile
    profiles: ["gpu"]
    ports:
      - "8001:8001"
    environment:
      SAM_VARIANT: ${SAM_VARIANT:-tiny}
      DINO_VARIANT: ${DINO_VARIANT:-T}
      BOX_THRESHOLD: ${BOX_THRESHOLD:-0.35}
      TEXT_THRESHOLD: ${TEXT_THRESHOLD:-0.25}
      HF_HOME: /app/.cache/huggingface
      LOG_LEVEL: ${GSAM2_LOG_LEVEL:-INFO}
    volumes:
      - gsam2_checkpoints:/app/checkpoints
      - gsam2_hf_cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # v0.8.8 · 可观测性 stack（默认 profile=monitoring 不启动，避免 dev 多吃 ~200MB）
  # 启动方式：`docker compose --profile monitoring up -d prometheus grafana`
  # 注意：prometheus scrape 的 host.docker.internal 仅在 Docker Desktop（Mac/Win）
  # 与 Linux 4.20+ docker compose 自动解析；不通时把 prometheus.yml 中 target 改成
  # 宿主机 LAN IP 即可。
  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
    extra_hosts:
      # Linux 上 host.docker.internal 默认未解析；显式映射到宿主机 gateway。
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana-oss:11.4.0
    profiles: ["monitoring"]
    ports:
      - "3001:3000"  # 避开前端 dev 3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin  # dev-only；production 改 env
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  miniodata:
  gsam2_checkpoints:
  gsam2_hf_cache:
  prometheus_data:
  grafana_data:
