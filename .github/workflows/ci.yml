name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: annotation_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/annotation_test
      TEST_DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/annotation_test
      SECRET_KEY: ci-test-secret
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: annotations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Sync deps
        working-directory: apps/api
        run: uv sync --extra test
      - name: alembic upgrade head
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: alembic round-trip (upgrade-then-downgrade-then-upgrade)
        working-directory: apps/api
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head
      - name: pytest with coverage
        working-directory: apps/api
        run: uv run pytest -q --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  vitest:
    name: Frontend vitest + tsc + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: pnpm install
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: tsc + build (codegen reads checked-in snapshot)
        working-directory: apps/web
        env:
          OPENAPI_URL: ${{ github.workspace }}/apps/api/openapi.snapshot.json
        run: pnpm build
      - name: vitest with coverage
        working-directory: apps/web
        run: pnpm test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/web/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint (ruff + eslint)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check --fix apps/api
        run: ruff check --fix apps/api/app apps/api/tests
      - name: ruff format (auto-fix)
        run: ruff format apps/api/app apps/api/tests
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: pnpm install
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: codegen (read snapshot for typecheck)
        working-directory: apps/web
        env:
          OPENAPI_URL: ${{ github.workspace }}/apps/api/openapi.snapshot.json
        run: pnpm codegen
      - name: tsc --noEmit
        working-directory: apps/web
        run: pnpm typecheck
      - name: eslint
        working-directory: apps/web
        run: pnpm lint
      - name: Auto-commit lint & format fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix (ruff check --fix + format)"
          file_pattern: "apps/api/**/*.py"

  docs-build:
    name: Docs build (VitePress)
    # 任何 PR 都跑：让 dead-link / hotkeys SoT 漂移 / snippet 不一致即时暴露。
    # 本地构建约 5s + prebuild 同步 openapi/hotkeys/snippet 约 2s。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: pnpm docs:build
        env:
          DOCS_BASE: /
        run: pnpm docs:build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # 当下大部分 spec 是 .skip 占位，跑通是为了校验 wiring。
    # 等真实 spec 写好后，把 continue-on-error 去掉。
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: annotation_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/annotation_test
      SECRET_KEY: ci-test-secret
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: annotations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Sync API deps
        working-directory: apps/api
        run: uv sync --extra test
      - name: alembic upgrade head
        working-directory: apps/api
        run: uv run alembic upgrade head
      - name: Start FastAPI in background
        working-directory: apps/api
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in {1..30}; do
            curl -s http://localhost:8000/health && break
            sleep 1
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: pnpm install
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: apps/web
        env:
          OPENAPI_URL: ${{ github.workspace }}/apps/api/openapi.snapshot.json
        run: pnpm build
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E
        working-directory: apps/web
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
