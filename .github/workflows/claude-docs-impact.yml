name: Claude Docs Impact

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  claude-docs-impact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare docs impact hint
        run: |
          node scripts/check-doc-impact.mjs \
            --base=${{ github.event.pull_request.base.sha }} \
            --head=${{ github.event.pull_request.head.sha }} \
            --write=.tmp/docs-impact.json \
            --write-markdown=.tmp/docs-impact.md

      - name: Run Claude Docs Impact Review
        id: claude-docs-impact
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analyze whether PR #${{ github.event.pull_request.number }} in ${{ github.repository }} likely needs documentation updates.

            Use these local inputs:
            - `.github/docs-impact-map.json` as the repository-maintained path-to-doc mapping.
            - `.tmp/docs-impact.json` and `.tmp/docs-impact.md` as deterministic hints generated from the changed files.
            - The actual PR diff as the source of truth.

            Output rules:
            - Return structured JSON only.
            - Use `.tmp/docs-impact.json` recommended docs as the candidate set whenever possible.
            - Do not invent new doc paths unless the deterministic candidate set is clearly insufficient.
            - Keep at most 5 suggested files, deduplicated, sorted by priority.
            - Confidence must be one of: `high`, `medium`, `low`.

            Decision rules:
            - Prefer repository docs paths over generic advice.
            - Mention ADR only when the change appears architectural or semantics-changing.
            - Be conservative: if the PR changes user-facing behavior, API contract, workflow semantics, permissions, state machines, AI handoff, or environment config, that increases confidence.
            - If no docs update looks necessary, return an empty `suggested_files` array and status `probably_not_needed`.
          claude_args: >-
            --json-schema
            {"type":"object","properties":{"status":{"type":"string","enum":["needs_update","probably_not_needed","uncertain"]},"suggested_files":{"type":"array","maxItems":5,"items":{"type":"object","properties":{"path":{"type":"string"},"confidence":{"type":"string","enum":["high","medium","low"]}},"required":["path","confidence"],"additionalProperties":false}}},"required":["status","suggested_files"],"additionalProperties":false}

      - name: Render docs impact comment
        id: render-docs-impact-comment
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude-docs-impact.outputs.structured_output }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const lines = ["<!-- claude-docs-impact -->"];
          const raw = process.env.STRUCTURED_OUTPUT;

          if (!raw) {
            lines.push("Docs impact: uncertain.");
            fs.writeFileSync(".tmp/docs-impact-comment.md", `${lines.join("\n")}\n`);
            process.exit(0);
          }

          let output;
          try {
            output = JSON.parse(raw);
          } catch {
            lines.push("Docs impact: uncertain.");
            fs.writeFileSync(".tmp/docs-impact-comment.md", `${lines.join("\n")}\n`);
            process.exit(0);
          }
          const files = Array.isArray(output.suggested_files) ? output.suggested_files : [];

          if (files.length === 0) {
            const status = output.status === "uncertain"
              ? "Docs impact: uncertain."
              : "Docs impact: probably not needed.";
            lines.push(status);
          } else {
            lines.push("Docs impact:");
            for (const item of files) {
              lines.push(`- \`${item.path}\` — ${item.confidence}`);
            }
          }

          fs.writeFileSync(".tmp/docs-impact-comment.md", `${lines.join("\n")}\n`);
          NODE

      - name: Find previous docs impact comment
        id: find-docs-impact-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- claude-docs-impact -->"

      - name: Create or update docs impact comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find-docs-impact-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: .tmp/docs-impact-comment.md
          edit-mode: replace
