name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous code review comment
        id: find-code-review-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- claude-code-review -->"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          track_progress: false
          claude_args: "--model claude-opus-4-7"
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Language: Write all PR comments and inline review comments in Chinese (Simplified).

            Required output behavior:
            - Publish the review results back to the PR, not only to the action log.
            - Start the top-level PR comment with the HTML marker `<!-- claude-code-review -->` (invisible to readers, used for deduplication).
            - Prefer one concise top-level PR comment that summarizes findings.
            - If there are actionable line-specific findings, also use inline review comments where useful.
            - If you found no meaningful issues, say that explicitly in the PR comment.

            Review scope:
            - Bugs, behavioral regressions, state-machine drift, permission drift, missing tests.
            - High-risk workflow interactions across project / batch / task / annotation / scheduler / review / AI preannotate.

            Keep the PR-visible output concise and actionable.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Delete previous code review comment
        if: steps.find-code-review-comment.outputs.comment-id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.find-code-review-comment.outputs.comment-id }},
            });
