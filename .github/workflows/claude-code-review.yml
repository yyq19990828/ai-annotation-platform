name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find previous code review comment
        id: find-code-review-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "claude[bot]"
          body-includes: "<!-- claude-code-review -->"

      - name: Delete previous code review comment
        if: steps.find-code-review-comment.outputs.comment-id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.find-code-review-comment.outputs.comment-id }},
            });

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: false
          claude_args: "--model claude-opus-4-7 --allowedTools Bash"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Language: Write all PR comments and inline review comments in Chinese (Simplified).

            Required output behavior:
            - Post the top-level review summary as a PR issue comment (NOT a GitHub review submission).
              Use: gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "..."
            - Start that comment with the HTML marker `<!-- claude-code-review -->` (invisible to readers, used for deduplication).
            - Prefer one concise top-level comment that summarizes findings.
            - If there are actionable line-specific findings, also post inline review comments.
            - If you found no meaningful issues, say that explicitly in the PR comment.

            Review scope:
            - Bugs, behavioral regressions, state-machine drift, permission drift, missing tests.
            - High-risk workflow interactions across project / batch / task / annotation / scheduler / review / AI preannotate.

            Keep the PR-visible output concise and actionable.
