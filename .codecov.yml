# Codecov 配置：v0.7.5 软启用 per-flag target，仍 informational 观察 1-2 周。
# 后端目标 60% / 前端 30%；累计数据稳定后切硬阻断（去 informational）。
coverage:
  status:
    project:
      backend:
        target: 60%
        threshold: 2%
        flags: [backend]
        informational: true
      frontend:
        target: 30%
        threshold: 2%
        flags: [frontend]
        informational: true
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  backend:
    paths:
      - apps/api/app
    carryforward: true
  frontend:
    paths:
      - apps/web/src
    carryforward: true

ignore:
  - "apps/api/app/migrations"
  - "apps/web/src/api/generated"
  - "**/__tests__"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/e2e"
