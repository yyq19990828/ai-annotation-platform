# v0.8.8 · Grafana auto-provision dashboards。
# 把 /var/lib/grafana/dashboards/ 下的 *.json 自动加载到 "Anno" folder。
apiVersion: 1

providers:
  - name: anno
    orgId: 1
    folder: Anno
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
