server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # v0.9.11 · CSP nonce 收紧 (script-src only). 与 SecurityHeadersMiddleware 分工:
    # - Nginx 负责 HTML 出站 CSP (script-src 含 per-request nonce, 替代 'unsafe-inline')
    # - FastAPI middleware 负责 API 响应 CSP (无 nonce, script-src 仅 'self')
    # 详见 docs/adr/0010-security-headers-middleware.md
    location / {
        # HTML 出站时 sub_filter 把 __CSP_NONCE__ 占位符 (vite plugin 注入) 替换为
        # $request_id (Nginx 自动生成的 32-char hex). 关闭 once, 多处 script + meta 都替.
        sub_filter '__CSP_NONCE__' $request_id;
        sub_filter_once off;
        sub_filter_types text/html;

        # CSP header 用同一个 $request_id, 与 HTML 内 nonce 属性保持一致.
        # script-src 去 'unsafe-inline', 改用 nonce; style-src 仍保留 'unsafe-inline' 留待 v0.10.x
        # ProjectSettingsPage 重构同窗口收紧 (~2600 处 <style={{}}> 迁移).
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'nonce-$request_id' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; connect-src 'self' https: wss: ws:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
