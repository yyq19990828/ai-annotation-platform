# v0.7.6 · Codecov 配置（前 v0.7.5 走 codecov-action 默认 informational 模式，无 yml）
#
# 设计意图：
#   - 把 target 显式化为基线值（backend 60% / frontend 8%），未来每版小幅抬升
#   - 保留 informational 阶段：本版 frontend 仅 8.68%（v0.7.6 baseline），强加门槛会阻断所有 PR
#   - patch target 设较高值（鼓励新代码必须有测试），但同样 informational
#
# 切硬阻断的触发条件（v0.7.7 评估）：
#   - frontend 累计 ≥ 25% 且持续 2 周稳定 → 把 informational 移除
#   - backend 当前 60%+ 已稳定，可在 v0.7.7 单独切硬阻断

coverage:
  status:
    project:
      backend:
        target: 60%
        threshold: 1%
        flags:
          - backend
        informational: true
      frontend:
        target: 8%
        threshold: 1%
        flags:
          - frontend
        informational: true
    patch:
      backend:
        target: 70%
        flags:
          - backend
        informational: true
      frontend:
        target: 50%
        flags:
          - frontend
        informational: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: backend
      paths:
        - apps/api/
    - name: frontend
      paths:
        - apps/web/src/

comment:
  layout: "reach,diff,flags,tree"
  require_changes: true

ignore:
  - "apps/api/alembic/versions/*"
  - "apps/api/tests/*"
  - "apps/web/src/api/generated/*"
  - "apps/web/e2e/*"
  - "apps/web/**/*.test.ts"
  - "apps/web/**/*.test.tsx"
  - "**/*.d.ts"
